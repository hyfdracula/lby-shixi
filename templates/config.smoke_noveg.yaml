# 离线 smoke test 配置 (不分类模式 by_veg=false); 不运行 GEE 下载。
# 验证: preprocess 跳 reclassify, ndvi_trend/phenology_trend 跳 lc, report_stats 跳按植被。

roi:
  name: smoke_region
  bbox: [115.42, 39.45, 117.50, 41.07]
  boundary_shp: null
  boundary_geojson: null

gee:
  key_file: ""

course:
  college: 林学院
  class_name: 地信23
  student_id: "000000"
  student_name: "测试"
  instructor: 梁博毅
  deadline: ""

date:
  start: "2018-01-01"
  end: "2020-12-31"
  demo: false

download:
  params: [ndvi]
  ndvi_tiled: false
  ndvi_tiles: [1, 1]

data:
  scale: 500
  cadence: 16
  products:
    ndvi_evi: "MODIS/061/MOD13A2"
    lai:      "MODIS/061/MOD15A2H"
    gpp:      "MODIS/061/MOD17A2HGF"
    lc:       "MODIS/061/MCD12Q1"

preprocess:
  sg_window: 5
  sg_polyorder: 2
  ndvi_min_valid: 0.05

phenology:
  threshold_ratio: 0.2

trend:
  alpha: 0.05
  z_critical: 1.96
  slope_threshold: 0.0005

veg_reclass:
  forest:     [1, 2, 3, 4, 5]
  grassland:  [6, 7, 10]
  cropland:   [12, 14]
  wetland:    [11]

analysis:
  by_veg: false   # 不分类模式

paths:
  data:    "./data"
  outputs: "./outputs_noveg"
  report:  "./report"

viz:
  style: bw

report:
  format: markdown
  output_basename: smoke_noveg_report
